# Firebase App Hosting configuration
# This tells App Hosting to use the API subdirectory
# https://firebase.google.com/docs/app-hosting

# Point to the API app within the monorepo
rootDirectory: apps/api

env:
  - variable: NODE_ENV
    value: production
  - variable: PORT
    value: "3001"
  - variable: FRONTEND_URL
    value: https://laudasist-1c1d2.web.app
  # Firebase Admin credentials are automatically available in App Hosting
